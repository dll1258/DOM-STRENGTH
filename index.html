<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DOM STRENGTH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#050508 !important}
:root{
  --gold:#c9a227;--gold-dim:#8a6f1a;--yellow:#ffd700;
  --black:#050508;--dark:#0a0a0f;--gray:#111118;--steel:#1a1a24;--border:#1e1e2e;
  --white:#d0d0e0;--dim:#555566;--red:#cc2200;--green:#00cc66;
}
body{color:var(--white);font-family:'Share Tech Mono',monospace;font-size:13px;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}
.header{background:linear-gradient(180deg,#000,var(--dark));border-bottom:1px solid var(--gold-dim);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(201,162,39,.15)}
.logo-wrap{display:flex;align-items:center;gap:12px}
.bar-icon{width:56px;height:28px;filter:drop-shadow(0 0 6px var(--gold))}
.logo{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--gold);letter-spacing:.15em;text-shadow:0 0 20px rgba(201,162,39,.5)}
.logo-sub{font-size:9px;color:var(--dim);letter-spacing:.12em;margin-top:1px}
.meta{font-size:9px;color:var(--dim);text-align:right}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,#000,var(--dark));border-top:1px solid var(--gold-dim);display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 12px;cursor:pointer;border:none;background:none;color:var(--dim);font-family:'Oswald',sans-serif;font-size:9px;gap:4px;letter-spacing:.1em;transition:color .2s;-webkit-tap-highlight-color:transparent}
.nav-btn.active{color:var(--gold)}
.nav-btn svg{width:20px;height:20px;fill:currentColor}
.screen{display:none;padding:16px 16px 80px}
.screen.active{display:block}
.day-nav{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.day-nav::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;background:var(--gray);border:1px solid var(--border);border-radius:4px;padding:8px 14px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:10px;color:var(--dim);text-align:center;min-width:90px;letter-spacing:.08em;-webkit-tap-highlight-color:transparent;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%)}
.day-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:600;box-shadow:0 0 15px rgba(201,162,39,.4)}
.day-btn.done-day{border-color:#00cc6640;color:var(--green)}
.day-btn.done-day.active{background:var(--gold);color:#000;border-color:var(--gold)}
.day-btn .day-tag{font-size:8px;margin-top:2px;opacity:.7;font-family:'Share Tech Mono',monospace}
.day-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.day-title{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--white);letter-spacing:.1em}
.day-subtitle{font-size:10px;color:var(--gold);margin-top:3px;letter-spacing:.15em}
.done-badge{background:#00cc6615;border:1px solid #00cc6640;color:var(--green);font-size:9px;padding:3px 8px;border-radius:2px;letter-spacing:.1em;font-family:'Oswald',sans-serif}
.progress-wrap{background:var(--steel);height:2px;margin-bottom:16px}
.progress-fill{background:linear-gradient(90deg,var(--gold-dim),var(--gold));height:2px;transition:width .4s;box-shadow:0 0 8px var(--gold)}
.progress-fill.full{background:linear-gradient(90deg,#00aa44,var(--green));box-shadow:0 0 8px var(--green)}
.plan-card{background:var(--gray);border:1px solid var(--border);border-left:2px solid var(--gold-dim);border-radius:0 4px 4px 0;margin-bottom:10px;overflow:hidden}
.plan-card.card-done{border-left-color:var(--green);border-color:#00cc6620}
.plan-card-header{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:8px;background:linear-gradient(90deg,#0a0a0f,#111118)}
.plan-card-name{flex:1;font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;color:var(--white);letter-spacing:.08em}
.plan-card-note{font-size:9px;color:var(--dim);text-align:right;max-width:160px;line-height:1.4}
.plan-card-status{font-size:10px;color:var(--dim);white-space:nowrap;font-family:'Oswald',sans-serif}
.plan-card-status.done{color:var(--green)}
.plan-sets{padding:10px 14px}
.set-row{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.set-num{font-size:10px;color:var(--dim);min-width:36px}
.set-row input{background:#050508;color:var(--white);border:1px solid var(--steel);padding:9px 8px;border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:12px;outline:none;min-width:0}
.set-row input:focus{border-color:var(--gold)}
.set-row input::placeholder{color:#333340}
.iw{flex:1.2}.ir{flex:0.8}.irpe{flex:0.8}
.log-btn{background:var(--gold);color:#000;border:none;padding:9px 12px;border-radius:2px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;white-space:nowrap;-webkit-tap-highlight-color:transparent;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%)}
.undo-btn{background:#1a0505;color:#cc6666;border:1px solid #cc220030;padding:7px 8px;border-radius:2px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:10px;-webkit-tap-highlight-color:transparent}
.set-done{color:var(--green);font-size:11px;flex:1;padding:4px 0}
.session-done{background:#001a0d;border:1px solid #00cc6630;border-left:2px solid var(--green);border-radius:0 4px 4px 0;padding:14px;margin-bottom:12px}
.session-done-title{color:var(--green);font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;letter-spacing:.1em;margin-bottom:8px}
.copy-summary{background:#000;border:1px solid var(--border);border-radius:2px;padding:10px;font-size:11px;color:#888;white-space:pre-line;margin-bottom:8px;max-height:120px;overflow-y:auto}
.copy-btn{width:100%;padding:10px;background:var(--green);color:#000;border:none;border-radius:2px;font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.1em;-webkit-tap-highlight-color:transparent;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%)}
.section-title{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:var(--gold);letter-spacing:.15em;margin-bottom:16px;border-bottom:1px solid var(--gold-dim);padding-bottom:8px}
.filter-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.filter-row input,.filter-row select{background:#050508;color:var(--white);border:1px solid var(--steel);padding:10px;border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:12px;outline:none;flex:1;min-width:0}
.filter-row select option{background:#0a0a0f}
.db-count{font-size:10px;color:var(--dim);margin-bottom:8px}
.db-table{width:100%;border-collapse:collapse;background:var(--gray);border:1px solid var(--border)}
.db-table thead tr{background:#000;border-bottom:1px solid var(--gold-dim)}
.db-table th{padding:14px 10px;text-align:left;color:var(--gold);font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.12em;cursor:pointer;white-space:nowrap;user-select:none;-webkit-tap-highlight-color:rgba(201,162,39,.2)}
.db-table tbody tr{border-bottom:1px solid #0f0f18}
.db-table tbody tr:nth-child(even){background:#0a0a10}
.db-table td{padding:8px 10px;white-space:nowrap;font-size:12px}
.td-date{color:var(--dim)}.td-single{color:var(--gold);font-weight:700}
.td-rpe-high{color:var(--red)}.td-rpe-med{color:var(--gold)}.td-rpe-low{color:#888}
.badge{padding:2px 6px;border-radius:1px;font-size:8px;text-transform:uppercase;border:1px solid;letter-spacing:.06em;font-family:'Oswald',sans-serif}
.badge.hypertrophy{color:#4a90d9;border-color:#4a90d940;background:#4a90d910}
.badge.strength{color:var(--gold);border-color:var(--gold-dim);background:rgba(201,162,39,.05)}
.badge.peaking{color:#cc44aa;border-color:#cc44aa40;background:#cc44aa10}
.pr-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.pr-card{background:var(--gray);border:1px solid var(--border);border-top:2px solid var(--gold-dim);padding:14px;position:relative;overflow:hidden}
.pr-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.pr-lift{font-family:'Oswald',sans-serif;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px}
.pr-weight{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;color:var(--gold);text-shadow:0 0 20px rgba(201,162,39,.3)}
.pr-unit{font-size:13px;color:var(--dim)}.pr-date{font-size:9px;color:var(--dim);margin-top:3px}
.pr-rpe{font-size:9px;color:var(--gold)}
.pr-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #0f0f18;font-size:11px}
.pr-row-best{color:var(--gold);font-weight:700}
.trend-card{background:var(--gray);border:1px solid var(--border);border-radius:4px;padding:14px;margin-bottom:12px}
.trend-label{font-family:'Oswald',sans-serif;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px}
.trend-select-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.trend-select-row select{background:#050508;color:var(--white);border:1px solid var(--steel);padding:10px;border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:12px;outline:none;flex:1}
.trend-stats{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px}
.stat-label{font-family:'Oswald',sans-serif;font-size:9px;color:var(--dim);letter-spacing:.1em}
.stat-val{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:var(--white)}
.stat-val.gold{color:var(--gold)}.stat-val.green{color:var(--green)}
.stat-sub{font-size:9px;color:var(--dim)}
.session-card{background:var(--gray);border:1px solid var(--border);border-left:2px solid var(--gold-dim);border-radius:0 4px 4px 0;margin-bottom:10px;overflow:hidden}
.session-card-header{background:#000;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.session-date{font-family:'Oswald',sans-serif;color:var(--gold);font-weight:700;font-size:12px;letter-spacing:.1em}
.session-meta{font-size:10px;color:var(--dim)}
.session-ex{color:var(--white);font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;margin-bottom:3px;margin-top:6px}
.session-set{color:var(--dim);font-size:11px;padding-left:8px}
.bat-signal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80vw;max-width:480px;pointer-events:none;z-index:0;opacity:0.04}
.more{padding:10px;text-align:center;color:var(--dim);font-size:11px}
</style>
</head>

        setsHtml+='<div class="set-row"><span class="set-num">SET '+(si+1)+'</span>'
          +'<span class="set-done">✓ '+(found.weight>0?found.weight+'lb':'BW')+' × '+found.reps+(found.rpe?' @'+found.rpe:'')+'</span>'
          +'<button class="undo-btn" ontouchend="unlogSet('+activeDay+','+ei+','+si+',''+key+'');event.preventDefault()" onclick="unlogSet('+activeDay+','+ei+','+si+',''+key+'')">UNDO</button></div>';
      }else{
        var prev=daySets.filter(function(s){return s.exIdx===ei&&s.logged;}).slice(-1)[0];
        setsHtml+='<div class="set-row"><span class="set-num">SET '+(si+1)+'</span>'
          +'<input class="iw" type="number" id="w-'+ei+'-'+si+'" placeholder="LB" value="'+(prev?prev.weight:'')+'" step="2.5">'
          +'<input class="ir" type="number" id="r-'+ei+'-'+si+'" placeholder="REPS" value="'+(prev?prev.reps:'')+'">'
          +'<input class="irpe" type="number" id="e-'+ei+'-'+si+'" placeholder="RPE" min="1" max="10" step="0.5">'
          +'<button class="log-btn" ontouchend="logSet('+activeDay+','+ei+','+si+',''+key+'');event.preventDefault()" onclick="logSet('+activeDay+','+ei+','+si+',''+key+'')">LOG</button></div>';
      }
    }
    html+='<div class="plan-card'+(allDone?' card-done':'')+'"><div class="plan-card-header">'
      +'<span class="plan-card-name">'+(allDone?'✓ ':'')+ex.exercise.toUpperCase()+'</span>'
      +'<span class="plan-card-note">'+ex.note+'</span>'
      +'<span class="plan-card-status'+(allDone?' done':'')+'">'+exSets.length+'/'+ex.sets+'</span>'
      +'</div><div class="plan-sets">'+setsHtml+'</div></div>';
  });
  document.getElementById('day-content').innerHTML=html;
}
function logSet(dayIdx,ei,si,key){
  var w=parseFloat(document.getElementById('w-'+ei+'-'+si).value);
  var r=parseInt(document.getElementById('r-'+ei+'-'+si).value);
  var rpe=document.getElementById('e-'+ei+'-'+si).value?parseFloat(document.getElementById('e-'+ei+'-'+si).value):null;
  if(isNaN(w)){alert('ENTER WEIGHT');return;}
  if(!r||r<=0){alert('ENTER REPS');return;}
  var sets=loadDaySets(dayIdx);
  var idx=sets.findIndex(function(s){return s.key===key;});
  var entry={key:key,exIdx:ei,setIdx:si,weight:w,reps:r,rpe:rpe,logged:true};
  if(idx>=0)sets[idx]=entry;else sets.push(entry);
  saveDaySets(dayIdx,sets);
  renderDayContent();
}
function unlogSet(dayIdx,ei,si,key){
  var sets=loadDaySets(dayIdx).filter(function(s){return s.key!==key;});
  saveDaySets(dayIdx,sets);
  renderDayContent();
}
function copySummary(dayIdx,btn){
  var text=document.getElementById('copy-'+dayIdx).textContent;
  navigator.clipboard.writeText(text).then(function(){btn.textContent='✓ TRANSMITTED TO ALFRED';});
}
function renderSessions(){
  var manual=DATA.filter(function(r){return r.manual;});
  var byDate={};
  manual.forEach(function(r){
    if(!byDate[r.dateStr])byDate[r.dateStr]={};
    if(!byDate[r.dateStr][r.exercise])byDate[r.dateStr][r.exercise]=[];
    byDate[r.dateStr][r.exercise].push(r);
  });
  var dates=Object.keys(byDate).sort(function(a,b){return new Date(b)-new Date(a);});
  var el=document.getElementById('sessions-list');
  if(!dates.length){el.innerHTML='<div style="color:#555;font-size:12px">NO MISSIONS ON RECORD</div>';return;}
  el.innerHTML=dates.slice(0,10).map(function(date){
    var exs=byDate[date];
    var cnt=Object.values(exs).reduce(function(a,v){return a+v.length;},0);
    return'<div class="session-card"><div class="session-card-header">'
      +'<span class="session-date">'+date.toUpperCase()+'</span>'
      +'<span class="session-meta">'+Object.keys(exs).length+' EX · '+cnt+' SETS</span>'
      +'</div><div style="padding:10px 14px">'
      +Object.entries(exs).map(function(e){
        return'<div class="session-ex">'+e[0].toUpperCase()+'</div>'
          +e[1].map(function(s){return'<div class="session-set">'+(s.weight>0?s.weight+'lb':'BW')+'×'+s.reps+(s.rpe?' @'+s.rpe:'')+'</div>';}).join('');
      }).join('')+'</div></div>';
  }).join('');
}
var sortKey='date',sortDir=-1,filtered=[];
function applyFilters(){
  var s=document.getElementById('db-search').value.toLowerCase();
  var b=document.getElementById('db-block').value;
  var e=document.getElementById('db-ex').value;
  filtered=DATA.filter(function(r){
    if(b&&r.block!==b)return false;
    if(e&&r.exercise!==e)return false;
    if(s&&r.exercise.toLowerCase().indexOf(s)<0)return false;
    return true;
  });
  doSort();
}
function sortBy(key){
  if(sortKey===key)sortDir*=-1;else{sortKey=key;sortDir=-1;}
  document.querySelectorAll('[id^=s-]').forEach(function(el){el.textContent='';});
  document.getElementById('s-'+key).textContent=sortDir===-1?'↓':'↑';
  doSort();
}
function doSort(){
  filtered.sort(function(a,b){
    var va=a[sortKey],vb=b[sortKey];
    if(sortKey==='date'){va=a.ts;vb=b.ts;}
    if(va===null&&vb===null)return 0;
    if(va===null)return 1;if(vb===null)return -1;
    if(typeof va==='string')return sortDir*va.localeCompare(vb);
    return sortDir*(va-vb);
  });
  renderDB();
}
function renderDB(){
  var limit=300;
  document.getElementById('db-body').innerHTML=filtered.slice(0,limit).map(function(r){
    var wC=r.reps===1?'td-single':'';
    var rpeC=r.rpe>=9?'td-rpe-high':r.rpe>=8?'td-rpe-med':'td-rpe-low';
    return'<tr><td class="td-date">'+r.dateStr+'</td>'
      +'<td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;color:#c0c0d0">'+r.exercise.toUpperCase()+'</td>'
      +'<td class="'+wC+'">'+(r.weight>0?r.weight+' lb':'BW')+'</td>'
      +'<td style="color:#888">'+(r.reps||'—')+'</td>'
      +'<td class="'+rpeC+'">'+(r.rpe!=null?r.rpe:'—')+'</td>'
      +'<td><span class="badge '+r.block+'">'+r.block.slice(0,4).toUpperCase()+'</span></td></tr>';
  }).join('');
  document.getElementById('db-count').textContent=filtered.length+' RECORDS FOUND';
  var more=document.getElementById('db-more');
  if(filtered.length>limit){more.style.display='block';more.textContent='SHOWING '+limit+' OF '+filtered.length+' — FILTER TO NARROW';}
  else more.style.display='none';
}
applyFilters();
var KEY_LIFTS=['Comp Bench','Comp Squat','Comp Deadlift'];
function renderPRs(){
  document.getElementById('pr-grid').innerHTML=KEY_LIFTS.map(function(lift){
    var sets=DATA.filter(function(r){return r.exercise===lift&&r.reps===1&&r.weight>0;}).sort(function(a,b){return b.weight-a.weight;});
    var pr=sets[0];
    return'<div class="pr-card"><div class="pr-lift">'+lift.replace('Comp ','')+'</div>'
      +(pr?'<div><span class="pr-weight">'+pr.weight+'</span><span class="pr-unit"> LB</span></div>'
        +'<div class="pr-date">'+pr.dateStr.toUpperCase()+'</div>'
        +(pr.rpe?'<div class="pr-rpe">RPE '+pr.rpe+'</div>':'')
        :'<div style="color:#333;font-size:12px">NO DATA</div>')
      +'</div>';
  }).join('');
  document.getElementById('pr-recent').innerHTML=KEY_LIFTS.map(function(lift){
    var sets=DATA.filter(function(r){return r.exercise===lift&&r.reps===1&&r.weight>0;}).sort(function(a,b){return b.ts-a.ts;}).slice(0,8);
    var best=sets.reduce(function(m,r){return r.weight>m?r.weight:m;},0);
    if(!sets.length)return'';
    return'<div class="trend-card"><div class="trend-label">'+lift.toUpperCase()+' — COMBAT RECORD</div>'
      +sets.map(function(r){
        return'<div class="pr-row"><span style="color:#555">'+r.dateStr.toUpperCase()+'</span>'
          +'<span class="'+(r.weight===best?'pr-row-best':'')+'">'+r.weight+' LB</span>'
          +(r.rpe?'<span style="color:#666">@'+r.rpe+'</span>':'<span></span>')
          +'<span class="badge '+r.block+'">'+r.block.slice(0,4).toUpperCase()+'</span></div>';
      }).join('')+'</div>';
  }).join('');
}
function renderTrend(){
  var lift=document.getElementById('trend-lift').value;
  var repF=document.getElementById('trend-reps').value;
  if(!lift)return;
  var sets=DATA.filter(function(r){return r.exercise===lift&&r.reps>0&&r.weight>0;}).sort(function(a,b){return a.ts-b.ts;});
  if(repF==='1')sets=sets.filter(function(r){return r.reps===1;});
  else if(repF!=='all')sets=sets.filter(function(r){return r.reps===parseInt(repF);});
  document.getElementById('trend-title').textContent=lift.toUpperCase()+(repF==='1'?' — SINGLES':repF==='all'?' — ALL SETS':' — '+repF+' REPS');
  var svg=document.getElementById('trend-svg');
  var W=340,H=160,pL=40,pR=10,pT=10,pB=25,iW=W-pL-pR,iH=H-pT-pB;
  if(!sets.length){
    svg.innerHTML='<text x="170" y="80" fill="#333" text-anchor="middle" font-size="12" font-family="Oswald,sans-serif">NO DATA ON RECORD</text>';
    document.getElementById('trend-stats').innerHTML='';
    document.getElementById('trend-table').innerHTML='';
    return;
  }
  var weights=sets.map(function(r){return r.weight;});
  var minW=Math.min.apply(null,weights)-10,maxW=Math.max.apply(null,weights)+10;
  var tms=sets.map(function(r){return r.ts;});
  var minT=Math.min.apply(null,tms),maxT=Math.max.apply(null,tms);
  function xS(t){return maxT===minT?pL+iW/2:pL+((t-minT)/(maxT-minT))*iW;}
  function yS(w){return H-pB-((w-minW)/(maxW-minW))*iH;}
  var pts=sets.map(function(r){return xS(r.ts)+','+yS(r.weight);}).join(' ');
  var grid='',yL='',i,t,y,v;
  for(i=0;i<=3;i++){t=i/3;y=pT+t*iH;v=Math.round(maxW-t*(maxW-minW));
    grid+='<line x1="'+pL+'" y1="'+y+'" x2="'+(W-pR)+'" y2="'+y+'" stroke="#1a1a2a" stroke-width="1"/>';
    yL+='<text x="'+(pL-4)+'" y="'+(y+4)+'" fill="#444" font-size="9" font-family="Share Tech Mono" text-anchor="end">'+v+'</text>';
  }
  var xL='',nT=Math.min(sets.length,5),j,idx2,rx,xx,dd;
  for(j=0;j<nT;j++){idx2=Math.round(j*(sets.length-1)/(nT-1||1));rx=sets[idx2];xx=xS(rx.ts);dd=new Date(rx.ts);
    xL+='<text x="'+xx+'" y="'+(H-pB+14)+'" fill="#444" font-size="9" font-family="Share Tech Mono" text-anchor="middle">'+dd.toLocaleDateString('en-US',{month:'short',year:'2-digit'}).toUpperCase()+'</text>';
  }
  var lX=xS(sets[sets.length-1].ts),fX=xS(sets[0].ts);
  var dots=sets.map(function(r){return'<circle cx="'+xS(r.ts)+'" cy="'+yS(r.weight)+'" r="3.5" fill="#c9a227" stroke="#050508" stroke-width="1.5"><title>'+r.dateStr+': '+r.weight+'lb x'+r.reps+(r.rpe?' @'+r.rpe:'')+'</title></circle>';}).join('');
  svg.innerHTML='<defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c9a227" stop-opacity="0.25"/><stop offset="100%" stop-color="#c9a227" stop-opacity="0"/></linearGradient></defs>'
    +grid+yL+xL
    +'<polygon points="'+pts+' '+lX+','+(H-pB)+' '+fX+','+(H-pB)+'" fill="url(#tg)"/>'
    +'<polyline points="'+pts+'" fill="none" stroke="#c9a227" stroke-width="2" stroke-linejoin="round"/>'
    +dots;
  var best2=Math.max.apply(null,weights),gain=best2-sets[0].weight;
  document.getElementById('trend-stats').innerHTML=
    '<div class="stat"><div class="stat-label">FIRST</div><div class="stat-val">'+sets[0].weight+' LB</div><div class="stat-sub">'+sets[0].dateStr.toUpperCase()+'</div></div>'
    +'<div class="stat"><div class="stat-label">LATEST</div><div class="stat-val gold">'+sets[sets.length-1].weight+' LB</div></div>'
    +'<div class="stat"><div class="stat-label">BEST</div><div class="stat-val gold">'+best2+' LB</div></div>'
    +'<div class="stat"><div class="stat-label">GAIN</div><div class="stat-val '+(gain>=0?'green':'')+'">'+( gain>=0?'+':'')+gain+' LB</div></div>';
  document.getElementById('trend-table').innerHTML=sets.slice().reverse().slice(0,12).map(function(r){
    return'<tr><td class="td-date">'+r.dateStr.toUpperCase()+'</td>'
      +'<td class="'+(r.reps===1?'td-single':'')+'">'+r.weight+' LB</td>'
      +'<td style="color:#888">'+r.reps+'</td>'
      +'<td class="'+(r.rpe>=9?'td-rpe-high':r.rpe>=8?'td-rpe-med':'td-rpe-low')+'">'+(r.rpe!=null?r.rpe:'—')+'</td>'
      +'<td><span class="badge '+r.block+'">'+r.block.slice(0,4).toUpperCase()+'</span></td></tr>';
  }).join('');
}
renderDayNav();
renderDayContent();
</script>
