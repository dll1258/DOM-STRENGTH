<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GOTHAM GAINS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bat-black:#050508;
  --bat-dark:#0a0a0f;
  --bat-gray:#111118;
  --bat-steel:#1a1a24;
  --bat-border:#252535;
  --bat-gold:#c9a227;
  --bat-gold-dim:#8a6f1a;
  --bat-yellow:#ffd700;
  --bat-white:#e0e0f0;
  --bat-dim:#7777aa;
  --bat-red:#e03010;
  --bat-green:#00dd66;
  --bat-blue:#1a3a5c;
}
body{background:var(--bat-black);color:var(--bat-white);font-family:'Share Tech Mono',monospace;font-size:14px;min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(ellipse at 50% 0%,#1a1a2e 0%,transparent 60%),
  repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(26,26,46,.25) 40px,rgba(26,26,46,.25) 41px),
  repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(26,26,46,.25) 40px,rgba(26,26,46,.25) 41px);}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bat-gold-dim);border-radius:2px}

/* HEADER */
.header{background:linear-gradient(180deg,#000 0%,var(–bat-dark) 100%);border-bottom:2px solid var(–bat-gold-dim);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 24px rgba(201,162,39,.2);}
.logo-wrap{display:flex;align-items:center;gap:14px}
.bat-icon{width:38px;height:38px;filter:drop-shadow(0 0 10px var(–bat-gold));}
.logo{font-family:‘Oswald’,sans-serif;font-size:20px;font-weight:700;color:var(–bat-gold);letter-spacing:.15em;text-transform:uppercase;text-shadow:0 0 20px rgba(201,162,39,.6);}
.logo-sub{font-size:10px;color:var(–bat-dim);letter-spacing:.2em;margin-top:2px}
.meta{font-size:10px;color:var(–bat-dim);text-align:right;letter-spacing:.05em;line-height:1.6}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,#000 0%,var(–bat-dark) 100%);border-top:2px solid var(–bat-gold-dim);display:flex;z-index:100;box-shadow:0 -2px 20px rgba(0,0,0,.9);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:11px 4px 14px;cursor:pointer;border:none;background:none;color:var(–bat-dim);font-family:‘Oswald’,sans-serif;font-size:10px;gap:5px;letter-spacing:.1em;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.nav-btn.active{color:var(–bat-gold);text-shadow:0 0 10px rgba(201,162,39,.6)}
.nav-btn svg{width:22px;height:22px;fill:currentColor}
.nav-btn.active svg{filter:drop-shadow(0 0 5px var(–bat-gold))}

/* SCREENS */
.screen{display:none;padding:18px 16px 88px}
.screen.active{display:block}

/* DAY TABS */
.day-nav{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.day-nav::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;background:var(–bat-gray);border:1px solid var(–bat-border);border-radius:4px;padding:10px 16px;cursor:pointer;font-family:‘Oswald’,sans-serif;font-size:11px;color:var(–bat-dim);text-align:center;transition:all .2s;min-width:100px;letter-spacing:.08em;-webkit-tap-highlight-color:transparent;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}
.day-btn.active{background:var(–bat-gold);border-color:var(–bat-gold);color:#000;font-weight:700;box-shadow:0 0 18px rgba(201,162,39,.5);}
.day-btn.done-day{border-color:#00dd6650;color:var(–bat-green)}
.day-btn.done-day.active{background:var(–bat-gold);color:#000;border-color:var(–bat-gold)}
.day-btn .day-tag{font-size:9px;margin-top:3px;opacity:.75;font-family:‘Share Tech Mono’,monospace}

/* DAY HEADER */
.day-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.day-title{font-family:‘Oswald’,sans-serif;font-size:26px;font-weight:700;color:var(–bat-white);letter-spacing:.1em;text-shadow:0 0 15px rgba(201,162,39,.2);}
.day-subtitle{font-size:11px;color:var(–bat-gold);margin-top:4px;letter-spacing:.15em}
.done-badge{background:#00dd6615;border:1px solid #00dd6650;color:var(–bat-green);font-size:10px;padding:4px 10px;border-radius:3px;letter-spacing:.1em;font-family:‘Oswald’,sans-serif;}

/* PROGRESS */
.progress-wrap{background:var(–bat-steel);height:3px;margin-bottom:18px;position:relative;overflow:hidden;}
.progress-fill{background:linear-gradient(90deg,var(–bat-gold-dim),var(–bat-gold));height:3px;transition:width .4s;box-shadow:0 0 10px var(–bat-gold);}
.progress-fill.full{background:linear-gradient(90deg,#00aa44,var(–bat-green));box-shadow:0 0 10px var(–bat-green)}

/* EXERCISE CARDS */
.plan-card{background:var(–bat-gray);border:1px solid var(–bat-border);border-left:3px solid var(–bat-gold-dim);border-radius:0 6px 6px 0;margin-bottom:12px;overflow:hidden;transition:border-color .2s;}
.plan-card.card-done{border-left-color:var(–bat-green);border-color:#00dd6625}
.plan-card-header{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(–bat-border);gap:10px;background:linear-gradient(90deg,#0a0a0f 0%,#111118 100%);}
.plan-card-name{flex:1;font-family:‘Oswald’,sans-serif;font-weight:600;font-size:15px;color:var(–bat-white);letter-spacing:.08em;}
.plan-card-note{font-size:10px;color:var(–bat-dim);text-align:right;max-width:170px;line-height:1.5}
.plan-card-status{font-size:11px;color:var(–bat-dim);white-space:nowrap;font-family:‘Oswald’,sans-serif;letter-spacing:.05em}
.plan-card-status.done{color:var(–bat-green)}

/* SET ROWS */
.plan-sets{padding:12px 16px}
.set-row{display:flex;gap:7px;align-items:center;margin-bottom:10px}
.set-num{font-size:11px;color:var(–bat-dim);min-width:40px;letter-spacing:.05em}
.set-row input{background:#050508;color:var(–bat-white);border:1px solid var(–bat-steel);padding:10px 9px;border-radius:3px;font-family:‘Share Tech Mono’,monospace;font-size:14px;outline:none;min-width:0;transition:border-color .2s;}
.set-row input:focus{border-color:var(–bat-gold);box-shadow:0 0 10px rgba(201,162,39,.25)}
.set-row input::placeholder{color:#33334a}
.iw{flex:1.2}.ir{flex:0.8}.irpe{flex:0.8}
.log-btn{background:var(–bat-gold);color:#000;border:none;padding:10px 13px;border-radius:3px;cursor:pointer;font-family:‘Oswald’,sans-serif;font-size:12px;font-weight:700;white-space:nowrap;letter-spacing:.1em;-webkit-tap-highlight-color:transparent;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);transition:all .15s;}
.log-btn:active{background:var(–bat-yellow);box-shadow:0 0 14px rgba(201,162,39,.7)}
.undo-btn{background:#1a0505;color:#ee7777;border:1px solid #cc220040;padding:8px 9px;border-radius:3px;cursor:pointer;font-family:‘Share Tech Mono’,monospace;font-size:11px;-webkit-tap-highlight-color:transparent;}
.set-done{color:var(–bat-green);font-size:13px;flex:1;padding:5px 0}

/* SESSION COMPLETE */
.session-done{background:#001a0d;border:1px solid #00dd6640;border-left:3px solid var(–bat-green);border-radius:0 6px 6px 0;padding:16px;margin-bottom:14px;}
.session-done-title{color:var(–bat-green);font-family:‘Oswald’,sans-serif;font-weight:700;font-size:15px;letter-spacing:.1em;margin-bottom:10px;}
.copy-summary{background:#000;border:1px solid var(–bat-border);border-radius:3px;padding:12px;font-size:12px;color:#9999bb;white-space:pre-line;margin-bottom:10px;max-height:130px;overflow-y:auto;line-height:1.7}
.copy-btn{width:100%;padding:12px;background:var(–bat-green);color:#000;border:none;border-radius:3px;font-family:‘Oswald’,sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.1em;-webkit-tap-highlight-color:transparent;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}

/* SECTION TITLE */
.section-title{font-family:‘Oswald’,sans-serif;font-size:18px;font-weight:700;color:var(–bat-gold);letter-spacing:.15em;margin-bottom:18px;text-transform:uppercase;border-bottom:2px solid var(–bat-gold-dim);padding-bottom:10px;text-shadow:0 0 15px rgba(201,162,39,.4);}

/* FILTERS */
.filter-row{display:flex;gap:9px;margin-bottom:11px;flex-wrap:wrap}
.filter-row input,.filter-row select{background:#050508;color:var(–bat-white);border:1px solid var(–bat-steel);padding:11px;border-radius:3px;font-family:‘Share Tech Mono’,monospace;font-size:13px;outline:none;flex:1;min-width:0;}
.filter-row input:focus,.filter-row select:focus{border-color:var(–bat-gold)}
.filter-row select option{background:#0a0a0f}
.db-count{font-size:11px;color:var(–bat-dim);margin-bottom:9px;letter-spacing:.05em}

/* TABLE */
.db-table{width:100%;border-collapse:collapse;background:var(–bat-gray);border:1px solid var(–bat-border);}
.db-table thead tr{background:#000;border-bottom:2px solid var(–bat-gold-dim)}
.db-table th{padding:14px 11px;text-align:left;color:var(–bat-gold);font-family:‘Oswald’,sans-serif;font-size:11px;letter-spacing:.12em;cursor:pointer;white-space:nowrap;user-select:none;}
.db-table th:active{background:rgba(201,162,39,.07)}
.db-table tbody tr{border-bottom:1px solid #0f0f1c}
.db-table tbody tr:nth-child(even){background:#0a0a12}
.db-table tbody tr:hover{background:#12121e}
.db-table td{padding:9px 11px;white-space:nowrap;font-size:13px}
.td-date{color:var(–bat-dim)}
.td-single{color:var(–bat-gold);font-weight:700}
.td-rpe-high{color:var(–bat-red)}
.td-rpe-med{color:var(–bat-gold)}
.td-rpe-low{color:#8888aa}
.badge{padding:2px 7px;border-radius:2px;font-size:9px;text-transform:uppercase;border:1px solid;letter-spacing:.06em;font-family:‘Oswald’,sans-serif;}
.badge.hypertrophy{color:#5aa0e9;border-color:#4a90d950;background:#4a90d912}
.badge.strength{color:var(–bat-gold);border-color:var(–bat-gold-dim);background:rgba(201,162,39,.07)}
.badge.peaking{color:#dd55cc;border-color:#cc44aa50;background:#cc44aa12}

/* PR CARDS */
.pr-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.pr-card{background:var(–bat-gray);border:1px solid var(–bat-border);border-top:3px solid var(–bat-gold-dim);border-radius:0 0 6px 6px;padding:16px;position:relative;overflow:hidden;}
.pr-card::before{content:’’;position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(–bat-gold),transparent);}
.pr-lift{font-family:‘Oswald’,sans-serif;font-size:10px;color:var(–bat-dim);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;}
.pr-weight{font-family:‘Oswald’,sans-serif;font-size:34px;font-weight:700;color:var(–bat-gold);text-shadow:0 0 20px rgba(201,162,39,.35)}
.pr-unit{font-size:14px;color:var(–bat-dim)}
.pr-date{font-size:10px;color:var(–bat-dim);margin-top:4px;letter-spacing:.05em}
.pr-rpe{font-size:10px;color:var(–bat-gold);letter-spacing:.05em}
.pr-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #0f0f1c;font-size:12px;}
.pr-row-best{color:var(–bat-gold);font-weight:700}

/* TREND CARD */
.trend-card{background:var(–bat-gray);border:1px solid var(–bat-border);border-radius:6px;padding:16px;margin-bottom:14px;}
.trend-label{font-family:‘Oswald’,sans-serif;font-size:10px;color:var(–bat-dim);text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px;}
.trend-select-row{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap}
.trend-select-row select{background:#050508;color:var(–bat-white);border:1px solid var(–bat-steel);padding:11px;border-radius:3px;font-family:‘Share Tech Mono’,monospace;font-size:13px;outline:none;flex:1;}
.trend-select-row select:focus{border-color:var(–bat-gold)}
.trend-stats{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px}
.stat-label{font-family:‘Oswald’,sans-serif;font-size:10px;color:var(–bat-dim);letter-spacing:.1em}
.stat-val{font-family:‘Oswald’,sans-serif;font-size:22px;font-weight:700;color:var(–bat-white)}
.stat-val.gold{color:var(–bat-gold);text-shadow:0 0 10px rgba(201,162,39,.3)}
.stat-val.green{color:var(–bat-green)}
.stat-sub{font-size:10px;color:var(–bat-dim)}

/* SESSIONS */
.session-card{background:var(–bat-gray);border:1px solid var(–bat-border);border-left:3px solid var(–bat-gold-dim);border-radius:0 6px 6px 0;margin-bottom:12px;overflow:hidden;}
.session-card-header{background:#000;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(–bat-border);}
.session-date{font-family:‘Oswald’,sans-serif;color:var(–bat-gold);font-weight:700;font-size:13px;letter-spacing:.1em;}
.session-meta{font-size:11px;color:var(–bat-dim);letter-spacing:.05em}
.session-ex{color:var(–bat-white);font-family:‘Oswald’,sans-serif;font-size:13px;font-weight:600;margin-bottom:4px;margin-top:7px;letter-spacing:.05em}
.session-set{color:var(–bat-dim);font-size:12px;padding-left:10px;line-height:1.7}

/* BAT SIGNAL */
.bat-signal{position:fixed;top:0;left:50%;transform:translateX(-50%);width:200px;height:200px;pointer-events:none;z-index:0;opacity:0.04;}
</style>

</head>
<body>

<svg class="bat-signal" viewBox="0 0 100 100">
  <ellipse cx="50" cy="50" rx="48" ry="48" fill="none" stroke="#ffd700" stroke-width="0.5"/>
  <path d="M50,20 C35,20 20,30 15,45 C25,40 35,42 40,50 C30,52 20,58 18,70 C28,62 38,60 50,65 C62,60 72,62 82,70 C80,58 70,52 60,50 C65,42 75,40 85,45 C80,30 65,20 50,20 Z" fill="#ffd700"/>
</svg>

<div class="header">
  <div class="logo-wrap">
    <svg class="bat-icon" viewBox="0 0 100 60">
      <path d="M50,5 C35,5 18,15 10,28 C20,22 32,24 38,32 C28,34 16,42 14,55 C26,46 38,44 50,50 C62,44 74,46 86,55 C84,42 72,34 62,32 C68,24 80,22 90,28 C82,15 65,5 50,5 Z" fill="#c9a227" filter="url(#glow)"/>
      <defs><filter id="glow"><feGaussianBlur stdDeviation="2" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    </svg>
    <div>
      <div class="logo">GOTHAM GAINS</div>
      <div class="logo-sub">WAYNE ENTERPRISES TRAINING DIVISION</div>
    </div>
  </div>
  <div class="meta" id="meta-info">INITIALIZING...</div>
</div>

<!-- LOG -->

<div id="screen-log" class="screen active">
  <div class="day-nav" id="day-nav"></div>
  <div id="day-content"></div>
</div>

<!-- SESSIONS -->

<div id="screen-sessions" class="screen">
  <div class="section-title">&#9656; MISSION LOG</div>
  <div id="sessions-list"></div>
</div>

<!-- DATABASE -->

<div id="screen-database" class="screen">
  <div class="section-title">&#9656; BATCOMPUTER DATABASE</div>
  <div class="filter-row">
    <input id="db-search" type="text" placeholder="SEARCH EXERCISE..." oninput="applyFilters()">
    <select id="db-block" onchange="applyFilters()">
      <option value="">ALL BLOCKS</option>
      <option value="hypertrophy">HYPERTROPHY</option>
      <option value="strength">STRENGTH</option>
      <option value="peaking">PEAKING</option>
    </select>
  </div>
  <div class="filter-row">
    <select id="db-ex" onchange="applyFilters()">
      <option value="">ALL EXERCISES</option>
    </select>
  </div>
  <div class="db-count" id="db-count"></div>
  <div style="overflow-x:auto;border-radius:3px">
    <table class="db-table">
      <thead><tr>
        <th onclick="sortBy('date')" ontouchend="sortBy('date');event.preventDefault()">DATE <span id="s-date">↓</span></th>
        <th onclick="sortBy('exercise')" ontouchend="sortBy('exercise');event.preventDefault()">EXERCISE <span id="s-exercise"></span></th>
        <th onclick="sortBy('weight')" ontouchend="sortBy('weight');event.preventDefault()">WT <span id="s-weight"></span></th>
        <th onclick="sortBy('reps')" ontouchend="sortBy('reps');event.preventDefault()">REPS <span id="s-reps"></span></th>
        <th onclick="sortBy('rpe')" ontouchend="sortBy('rpe');event.preventDefault()">RPE <span id="s-rpe"></span></th>
        <th onclick="sortBy('block')" ontouchend="sortBy('block');event.preventDefault()">BLOCK <span id="s-block"></span></th>
      </tr></thead>
      <tbody id="db-body"></tbody>
    </table>
  </div>
  <div id="db-more" style="display:none;padding:12px;text-align:center;color:#666;font-size:12px"></div>
</div>

<!-- PRs -->

<div id="screen-prs" class="screen">
  <div class="section-title">&#9656; COMBAT RECORDS</div>
  <div class="pr-grid" id="pr-grid"></div>
  <div id="pr-recent"></div>
</div>

<!-- TRENDS -->

<div id="screen-trends" class="screen">
  <div class="section-title">&#9656; TACTICAL ANALYSIS</div>
  <div class="trend-select-row">
    <select id="trend-lift" onchange="renderTrend()"><option value="">— SELECT TARGET —</option></select>
    <select id="trend-reps" onchange="renderTrend()">
      <option value="1">SINGLES</option>
      <option value="all">ALL SETS</option>
      <option value="2">2 REPS</option>
      <option value="3">3 REPS</option>
    </select>
  </div>
  <div class="trend-card">
    <div class="trend-label" id="trend-title">SELECT TARGET ABOVE</div>
    <svg id="trend-svg" viewBox="0 0 340 160" style="width:100%;overflow:visible"></svg>
    <div class="trend-stats" id="trend-stats"></div>
  </div>
  <div class="trend-card">
    <div class="trend-label">RECENT INTEL</div>
    <div style="overflow-x:auto">
      <table class="db-table">
        <thead><tr>
          <th style="padding:14px 11px">DATE</th>
          <th style="padding:14px 11px">WT</th>
          <th style="padding:14px 11px">REPS</th>
          <th style="padding:14px 11px">RPE</th>
          <th style="padding:14px 11px">BLOCK</th>
        </tr></thead>
        <tbody id="trend-table"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">
  <button class="nav-btn active" ontouchend="showScreen('log',this);event.preventDefault()" onclick="showScreen('log',this)">
    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14l4-4h12c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
    <span>LOG</span>
  </button>
  <button class="nav-btn" ontouchend="showScreen('sessions',this);event.preventDefault()" onclick="showScreen('sessions',this)">
    <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
    <span>HISTORY</span>
  </button>
  <button class="nav-btn" ontouchend="showScreen('database',this);event.preventDefault()" onclick="showScreen('database',this)">
    <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
    <span>DATA</span>
  </button>
  <button class="nav-btn" ontouchend="showScreen('prs',this);event.preventDefault()" onclick="showScreen('prs',this)">
    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/></svg>
    <span>RECORDS</span>
  </button>
  <button class="nav-btn" ontouchend="showScreen('trends',this);event.preventDefault()" onclick="showScreen('trends',this)">
    <svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
    <span>INTEL</span>
  </button>
</div>

function showScreen(name,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='prs') renderPRs();
  if(name==='trends') renderTrend();
  if(name==='sessions') renderSessions();
  if(name==='database') applyFilters();
}

let activeDay=0;
const TODAY_ID='thu_apr30';
activeDay=DAYS.findIndex(d=>d.id===TODAY_ID);
if(activeDay<0) activeDay=0;

function dayKey(i){return 'gotham_v5_'+DAYS[i].id;}
function loadDaySets(i){try{const s=sessionStorage.getItem(dayKey(i));if(s)return JSON.parse(s);}catch{}return PREFILL[DAYS[i].id]||[];}
function saveDaySets(i,sets){try{sessionStorage.setItem(dayKey(i),JSON.stringify(sets))}catch{}}

function renderDayNav(){
  document.getElementById('day-nav').innerHTML=DAYS.map((d,i)=>{
    const cls=['day-btn'];
    if(i===activeDay)cls.push('active');
    if(d.completed)cls.push('done-day');
    return`<div class="${cls.join(' ')}" ontouchend="switchDay(${i});event.preventDefault()" onclick="switchDay(${i})">
      <div style="font-weight:700">${d.label}</div>
      <div class="day-tag">${d.completed?'✓ ':''}${d.tag}</div>
    </div>`;
  }).join('');
}
function switchDay(i){activeDay=i;renderDayNav();renderDayContent();}

function renderDayContent(){
  const day=DAYS[activeDay];
  const daySets=loadDaySets(activeDay);
  const total=day.exercises.reduce((a,e)=>a+e.sets,0);
  const done=daySets.filter(s=>s.logged).length;
  const pct=total>0?Math.round(done/total*100):0;

  let html=`<div class="day-header">
    <div>
      <div class="day-title">${day.label}</div>
      <div class="day-subtitle">▶ ${day.tag.toUpperCase()}</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      ${day.completed?'<span class="done-badge">✓ COMPLETE</span>':''}
      <div style="font-size:12px;color:#7777aa;font-family:Oswald,sans-serif;letter-spacing:.1em">${done}/${total}</div>
    </div>
  </div>
  <div class="progress-wrap"><div class="progress-fill ${pct===100?'full':''}" style="width:${pct}%"></div></div>`;

  if(done>=total&&total>0){
    const summary=daySets.filter(s=>s.logged).map(s=>{
      const ex=day.exercises[s.exIdx];
      return ex.exercise+' '+(s.weight>0?s.weight+'lb':'BW')+'x'+s.reps+(s.rpe?' @'+s.rpe:'');
    }).join('\n');
    html+=`<div class="session-done">
      <div class="session-done-title">✓ MISSION COMPLETE</div>
      <div class="copy-summary" id="copy-${activeDay}">${summary}</div>
      <button class="copy-btn" ontouchend="copySummary(${activeDay},this);event.preventDefault()" onclick="copySummary(${activeDay},this)">TRANSMIT TO ALFRED</button>
    </div>`;
  }

  day.exercises.forEach((ex,ei)=>{
    const exSets=daySets.filter(s=>s.exIdx===ei&&s.logged);
    const allDone=exSets.length>=ex.sets;
    let setsHtml='';
    for(let si=0;si<ex.sets;si++){
      const key=ei+'_'+si;
      const found=daySets.find(s=>s.key===key&&s.logged);
      if(found){
        setsHtml+=`<div class="set-row">
          <span class="set-num">SET ${si+1}</span>
          <span class="set-done">✓ ${found.weight>0?found.weight+'lb':'BW'} × ${found.reps}${found.rpe?' @'+found.rpe:''}</span>
          <button class="undo-btn" ontouchend="unlogSet(${activeDay},${ei},${si},'${key}');event.preventDefault()" onclick="unlogSet(${activeDay},${ei},${si},'${key}')">UNDO</button>
        </div>`;
      }else{
        const prev=daySets.filter(s=>s.exIdx===ei&&s.logged).slice(-1)[0];
        setsHtml+=`<div class="set-row">
          <span class="set-num">SET ${si+1}</span>
          <input class="iw" type="number" id="w-${ei}-${si}" placeholder="LB" value="${prev?prev.weight:''}" step="2.5">
          <input class="ir" type="number" id="r-${ei}-${si}" placeholder="REPS" value="${prev?prev.reps:''}">
          <input class="irpe" type="number" id="e-${ei}-${si}" placeholder="RPE" min="1" max="10" step="0.5">
          <button class="log-btn" ontouchend="logSet(${activeDay},${ei},${si},'${key}');event.preventDefault()" onclick="logSet(${activeDay},${ei},${si},'${key}')">LOG</button>
        </div>`;
      }
    }
    html+=`<div class="plan-card ${allDone?'card-done':''}">
      <div class="plan-card-header">
        <span class="plan-card-name">${allDone?'✓ ':''}${ex.exercise.toUpperCase()}</span>
        <span class="plan-card-note">${ex.note}</span>
        <span class="plan-card-status ${allDone?'done':''}">${exSets.length}/${ex.sets}</span>
      </div>
      <div class="plan-sets">${setsHtml}</div>
    </div>`;
  });
  document.getElementById('day-content').innerHTML=html;
}

function logSet(dayIdx,ei,si,key){
  const w=parseFloat(document.getElementById('w-'+ei+'-'+si).value);
  const r=parseInt(document.getElementById('r-'+ei+'-'+si).value);
  const rpe=document.getElementById('e-'+ei+'-'+si).value?parseFloat(document.getElementById('e-'+ei+'-'+si).value):null;
  if(isNaN(w))return alert('ENTER WEIGHT, SOLDIER');
  if(!r||r<=0)return alert('ENTER REPS');
  const sets=loadDaySets(dayIdx);
  const idx=sets.findIndex(s=>s.key===key);
  const entry={key,exIdx:ei,setIdx:si,weight:w,reps:r,rpe,logged:true};
  if(idx>=0)sets[idx]=entry;else sets.push(entry);
  saveDaySets(dayIdx,sets);
  renderDayContent();
}
function unlogSet(dayIdx,ei,si,key){
  saveDaySets(dayIdx,loadDaySets(dayIdx).filter(s=>s.key!==key));
  renderDayContent();
}
function copySummary(dayIdx,btn){
  navigator.clipboard.writeText(document.getElementById('copy-'+dayIdx).textContent).then(()=>{btn.textContent='✓ TRANSMITTED TO ALFRED';});
}

function renderSessions(){
  const manual=DATA.filter(r=>r.manual);
  const byDate={};
  manual.forEach(r=>{if(!byDate[r.dateStr])byDate[r.dateStr]={};if(!byDate[r.dateStr][r.exercise])byDate[r.dateStr][r.exercise]=[];byDate[r.dateStr][r.exercise].push(r);});
  const dates=Object.keys(byDate).sort((a,b)=>new Date(b)-new Date(a));
  const el=document.getElementById('sessions-list');
  if(!dates.length){el.innerHTML='<div style="color:#555;font-size:13px;padding:20px 0">NO MISSIONS ON RECORD</div>';return;}
  el.innerHTML=dates.slice(0,15).map(date=>{
    const exs=byDate[date];const cnt=Object.values(exs).flat().length;
    return`<div class="session-card">
      <div class="session-card-header">
        <span class="session-date">${date.toUpperCase()}</span>
        <span class="session-meta">${Object.keys(exs).length} EX · ${cnt} SETS</span>
      </div>
      <div style="padding:12px 16px">
        ${Object.entries(exs).map(([ex,sets])=>
          `<div class="session-ex">${ex.toUpperCase()}</div>`+
          sets.map(s=>`<div class="session-set">${s.weight>0?s.weight+'lb':'BW'}×${s.reps}${s.rpe?' @'+s.rpe:''}</div>`).join('')
        ).join('')}
      </div>
    </div>`;
  }).join('');
}

let sortKey='date',sortDir=-1,filtered=[];
function applyFilters(){
  const s=document.getElementById('db-search').value.toLowerCase();
  const b=document.getElementById('db-block').value;
  const e=document.getElementById('db-ex').value;
  filtered=DATA.filter(r=>{
    if(b&&r.block!==b)return false;
    if(e&&r.exercise!==e)return false;
    if(s&&!r.exercise.toLowerCase().includes(s))return false;
    return true;
  });doSort();
}
function sortBy(key){
  if(sortKey===key)sortDir*=-1;else{sortKey=key;sortDir=-1;}
  document.querySelectorAll('[id^=s-]').forEach(el=>el.textContent='');
  document.getElementById('s-'+key).textContent=sortDir===-1?'↓':'↑';
  doSort();
}
function doSort(){
  filtered.sort((a,b)=>{
    let va=a[sortKey],vb=b[sortKey];
    if(sortKey==='date'){va=a.ts;vb=b.ts;}
    if(va===null&&vb===null)return 0;if(va===null)return 1;if(vb===null)return -1;
    if(typeof va==='string')return sortDir*va.localeCompare(vb);
    return sortDir*(va-vb);
  });renderDB();
}
function renderDB(){
  const limit=300;
  document.getElementById('db-body').innerHTML=filtered.slice(0,limit).map(r=>{
    const wC=r.reps===1?'td-single':'';
    const rpeC=r.rpe>=9?'td-rpe-high':r.rpe>=8?'td-rpe-med':'td-rpe-low';
    return`<tr>
      <td class="td-date">${r.dateStr}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;color:#ccccee">${r.exercise}</td>
      <td class="${wC}">${r.weight>0?r.weight+' lb':'BW'}</td>
      <td style="color:#aaaacc">${r.reps||'—'}</td>
      <td class="${rpeC}">${r.rpe??'—'}</td>
      <td><span class="badge ${r.block}">${r.block.slice(0,4).toUpperCase()}</span></td>
    </tr>`;
  }).join('');
  document.getElementById('db-count').textContent=filtered.length+' RECORDS FOUND';
  const more=document.getElementById('db-more');
  if(filtered.length>limit){more.style.display='block';more.textContent='SHOWING '+limit+' OF '+filtered.length+' — USE FILTERS TO NARROW';}
  else more.style.display='none';
}
applyFilters();

const KEY_LIFTS=['Comp Bench','Comp Squat','Comp Deadlift'];
const LIFT_LABELS={'Comp Bench':'BENCH','Comp Squat':'SQUAT','Comp Deadlift':'DEAD'};
function renderPRs(){
  document.getElementById('pr-grid').innerHTML=KEY_LIFTS.map(lift=>{
    const sets=DATA.filter(r=>r.exercise===lift&&r.reps===1&&r.weight>0).sort((a,b)=>b.weight-a.weight);
    const pr=sets[0];
    return`<div class="pr-card">
      <div class="pr-lift">${LIFT_LABELS[lift]||lift}</div>
      ${pr?`<div><span class="pr-weight">${pr.weight}</span><span class="pr-unit"> LB</span></div>
        <div class="pr-date">${pr.dateStr.toUpperCase()}</div>
        ${pr.rpe?`<div class="pr-rpe">RPE ${pr.rpe}</div>`:''}`:
        '<div style="color:#444;font-size:13px">NO DATA</div>'}
    </div>`;
  }).join('');
  document.getElementById('pr-recent').innerHTML=KEY_LIFTS.map(lift=>{
    const sets=DATA.filter(r=>r.exercise===lift&&r.reps===1&&r.weight>0).sort((a,b)=>b.ts-a.ts).slice(0,8);
    const best=sets.reduce((m,r)=>r.weight>m?r.weight:m,0);
    if(!sets.length)return'';
    return`<div class="trend-card">
      <div class="trend-label">${lift.toUpperCase()} — COMBAT RECORD</div>
      ${sets.map(r=>`<div class="pr-row">
        <span style="color:#666">${r.dateStr.toUpperCase()}</span>
        <span class="${r.weight===best?'pr-row-best':''}">${r.weight} LB</span>
        ${r.rpe?`<span style="color:#777">@${r.rpe}</span>`:'<span></span>'}
        <span class="badge ${r.block}">${r.block.slice(0,4).toUpperCase()}</span>
      </div>`).join('')}
    </div>`;
  }).join('');
}

function renderTrend(){
  const lift=document.getElementById('trend-lift').value;
  const repF=document.getElementById('trend-reps').value;
  if(!lift)return;
  let sets=DATA.filter(r=>r.exercise===lift&&r.reps>0&&r.weight>0).sort((a,b)=>a.ts-b.ts);
  if(repF==='1')sets=sets.filter(r=>r.reps===1);
  else if(repF!=='all')sets=sets.filter(r=>r.reps===parseInt(repF));
  document.getElementById('trend-title').textContent=lift.toUpperCase()+(repF==='1'?' — SINGLES':repF==='all'?' — ALL SETS':' — '+repF+' REPS');
  const svg=document.getElementById('trend-svg');
  const W=340,H=160,pad={l:44,r:12,t:10,b:26},iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  if(!sets.length){
    svg.innerHTML='<text x="170" y="80" fill="#444" text-anchor="middle" font-size="12" font-family="Oswald">NO DATA ON RECORD</text>';
    document.getElementById('trend-stats').innerHTML='';document.getElementById('trend-table').innerHTML='';return;
  }
  const weights=sets.map(r=>r.weight);
  const minW=Math.min(...weights)-10,maxW=Math.max(...weights)+10;
  const minT=Math.min(...sets.map(r=>r.ts)),maxT=Math.max(...sets.map(r=>r.ts));
  const xS=t=>maxT===minT?pad.l+iW/2:pad.l+((t-minT)/(maxT-minT))*iW;
  const yS=w=>H-pad.b-((w-minW)/(maxW-minW))*iH;
  const pts=sets.map(r=>xS(r.ts)+','+yS(r.weight)).join(' ');
  let grid='',yL='';
  for(let i=0;i<=3;i++){const t=i/3,y=pad.t+t*iH,v=Math.round(maxW-t*(maxW-minW));
    grid+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(W-pad.r)+'" y2="'+y+'" stroke="#1a1a2e" stroke-width="1"/>';
    yL+='<text x="'+(pad.l-5)+'" y="'+(y+4)+'" fill="#555577" font-size="9" font-family="Share Tech Mono" text-anchor="end">'+v+'</text>';}
  let xL='';const nT=Math.min(sets.length,5);
  for(let i=0;i<nT;i++){const idx=Math.round(i*(sets.length-1)/(nT-1||1));
    const r=sets[idx],x=xS(r.ts),d=new Date(r.ts);
    xL+='<text x="'+x+'" y="'+(H-pad.b+15)+'" fill="#555577" font-size="9" font-family="Share Tech Mono" text-anchor="middle">'+d.toLocaleDateString('en-US',{month:'short',year:'2-digit'}).toUpperCase()+'</text>';}
  const lX=xS(sets[sets.length-1].ts),fX=xS(sets[0].ts);
  const dots=sets.map(r=>'<circle cx="'+xS(r.ts)+'" cy="'+yS(r.weight)+'" r="4" fill="#c9a227" stroke="#050508" stroke-width="1.5"><title>'+r.dateStr+': '+r.weight+'lb x'+r.reps+(r.rpe?' @'+r.rpe:'')+'</title></circle>').join('');
  svg.innerHTML='<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c9a227" stop-opacity="0.3"/><stop offset="100%" stop-color="#c9a227" stop-opacity="0"/></linearGradient><filter id="glow2"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>'+
    grid+yL+xL+
    '<polygon points="'+pts+' '+lX+','+(H-pad.b)+' '+fX+','+(H-pad.b)+'" fill="url(#g)"/>'+
    '<polyline points="'+pts+'" fill="none" stroke="#c9a227" stroke-width="2.5" stroke-linejoin="round" filter="url(#glow2)"/>'+dots;
  const best=Math.max(...weights),gain=best-sets[0].weight;
  document.getElementById('trend-stats').innerHTML=
    '<div class="stat"><div class="stat-label">FIRST</div><div class="stat-val" style="font-size:18px">'+sets[0].weight+' LB</div><div class="stat-sub">'+sets[0].dateStr.toUpperCase()+'</div></div>'+
    '<div class="stat"><div class="stat-label">LATEST</div><div class="stat-val gold">'+sets[sets.length-1].weight+' LB</div></div>'+
    '<div class="stat"><div class="stat-label">BEST</div><div class="stat-val gold">'+best+' LB</div></div>'+
    '<div class="stat"><div class="stat-label">GAIN</div><div class="stat-val '+(gain>=0?'green':'')+'">'+(gain>=0?'+':'')+gain+' LB</div></div>';
  document.getElementById('trend-table').innerHTML=[...sets].reverse().slice(0,12).map(r=>
    '<tr><td class="td-date">'+r.dateStr.toUpperCase()+'</td>'+
    '<td class="'+(r.reps===1?'td-single':'')+'">'+r.weight+' LB</td>'+
    '<td style="color:#aaaacc">'+r.reps+'</td>'+
    '<td class="'+(r.rpe>=9?'td-rpe-high':r.rpe>=8?'td-rpe-med':'td-rpe-low')+'">'+(r.rpe??'—')+'</td>'+
    '<td><span class="badge '+r.block+'">'+r.block.slice(0,4).toUpperCase()+'</span></td></tr>').join('');
}

renderDayNav();
renderDayContent();
</script>
